version: "3"

vars:
  PUBLISHER: aggiovato
  EXT_NAME: yrest

tasks:
  # в”Җв”Җ Development в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

  compile:
    desc: Compile TypeScript
    cmd: npm run compile

  watch:
    desc: Compile in watch mode
    cmd: npm run watch

  lint:
    desc: Check code with ESLint
    cmd: npm run lint

  preflight:
    desc: Full pre-push check вҖ” compile and package
    cmds:
      - task: compile
      - task: package
      - cmd: |
          printf "\n\033[1;34mв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\033[0m\n"
          printf "\033[1;34mв”Ӯ\033[0m  \033[1;36mвңҰ  yrest-vscode В· preflight results  вңҰ\033[0m  \033[1;34mв”Ӯ\033[0m\n"
          printf "\033[1;34mв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\033[0m\n\n"
          printf "  \033[1;32mвң“\033[0m  \033[1mcompile\033[0m   \033[2mTypeScript clean\033[0m\n"
          printf "  \033[1;32mвң“\033[0m  \033[1mpackage\033[0m   \033[2mVSIX built correctly\033[0m\n"
          printf "\n  \033[1;32mвҶ’  All checks passed вҖ” safe to push\033[0m\n\n"
        silent: true

  # в”Җв”Җ Package в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

  package:
    desc: Build the .vsix package
    cmd: npx vsce package --no-dependencies

  install:local:
    desc: Build and install the extension locally in VS Code
    deps: [compile]
    cmds:
      - npx vsce package --no-dependencies
      - code --install-extension {{.EXT_NAME}}-$(node -p "require('./package.json').version").vsix

  # в”Җв”Җ Release в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

  release:patch:
    desc: Bump patch version (x.x.N), commit and tag
    cmd: npm version patch

  release:minor:
    desc: Bump minor version (x.N.0), commit and tag
    cmd: npm version minor

  release:major:
    desc: Bump major version (N.0.0), commit and tag
    cmd: npm version major

  # в”Җв”Җ Publish в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

  publish:pre:
    desc: Compile and publish as pre-release to VS Code Marketplace
    deps: [compile]
    cmd: npx vsce publish --pre-release

  publish:
    desc: Compile and publish stable release to VS Code Marketplace
    deps: [compile]
    cmd: npx vsce publish
