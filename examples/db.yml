# Reconocido por nombre de archivo: db.yml
# Ejemplo básico con shorthand y colecciones

_rel:
  posts:
    userId: users
  comments:
    postId: posts
    userId: users

_schema:
  users:
    id: integer
    name: string
    email: string
    role: string
  posts:
    id: integer
    userId: integer
    title: string
    published: boolean
  comments:
    id: integer
    postId: integer
    userId: integer
    body: string

