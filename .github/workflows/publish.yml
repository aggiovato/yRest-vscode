name: Publish to VS Code Marketplace

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      pre_release:
        description: "Publish as pre-release"
        type: boolean
        default: true

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Determine pre-release flag
        id: flags
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "pre_release=${{ inputs.pre_release }}" >> $GITHUB_OUTPUT
          else
            TAG="${GITHUB_REF#refs/tags/v}"
            MAJOR=$(echo "$TAG" | cut -d. -f1)
            if [ "$MAJOR" -lt 1 ]; then
              echo "pre_release=true" >> $GITHUB_OUTPUT
            else
              echo "pre_release=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Publish (pre-release)
        if: steps.flags.outputs.pre_release == 'true'
        run: npx vsce publish --pre-release --pat "${{ secrets.VSCE_PAT }}"

      - name: Publish (stable)
        if: steps.flags.outputs.pre_release == 'false'
        run: npx vsce publish --pat "${{ secrets.VSCE_PAT }}"

  create-release:
    needs: publish
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk "/^## \[$VERSION\]/{found=1; next} found && /^---/{exit} found{print}" CHANGELOG.md \
            > /tmp/release-notes.md
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          prerelease: ${{ needs.publish.outputs.pre_release == 'true' }}
          make_latest: ${{ needs.publish.outputs.pre_release == 'false' }}
